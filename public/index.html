<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市居民意见与投诉受理平台</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .hero-section {
      text-align: center;
      padding: 60px 20px;
      color: white;
    }
    .hero-title {
      font-size: 36px;
      margin-bottom: 16px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    .hero-subtitle {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 40px;
    }
    .auth-container {
      max-width: 420px;
      margin: 0 auto;
    }
    .auth-tabs {
      display: flex;
      margin-bottom: 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 4px;
    }
    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .auth-tab.active {
      background: white;
      color: #667eea;
      font-weight: 600;
    }
    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-size: 14px;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: #667eea;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-block {
      width: 100%;
      padding: 14px;
      font-size: 16px;
    }
    .auth-footer {
      margin-top: 20px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }
    .auth-footer a {
      color: #667eea;
      text-decoration: none;
    }
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 1000px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .feature-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 24px;
      border-radius: 12px;
      color: white;
      text-align: center;
    }
    .feature-icon {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }
    .feature-title {
      font-size: 18px;
      margin-bottom: 8px;
    }
    .feature-desc {
      font-size: 13px;
      opacity: 0.8;
    }
    .public-link {
      text-align: center;
      margin-top: 30px;
    }
    .public-link a {
      color: white;
      text-decoration: underline;
      opacity: 0.9;
    }
    @media (max-width: 768px) {
      .features {
        grid-template-columns: 1fr;
      }
      .hero-title {
        font-size: 28px;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero-section">
      <h1 class="hero-title">🏛️ 城市居民意见与投诉受理平台</h1>
      <p class="hero-subtitle">倾听民声、汇聚民智、解决民忧，共建美好城市</p>
      
      <div class="auth-container">
        <div class="auth-tabs">
          <div class="auth-tab active" data-tab="login">用户登录</div>
          <div class="auth-tab" data-tab="register">市民注册</div>
        </div>
        
        <div class="auth-card">
          <div id="login-form">
            <div class="form-group">
              <label class="form-label">手机号</label>
              <input type="tel" class="form-input" id="login-phone" placeholder="请输入手机号" maxlength="11">
            </div>
            <div class="form-group">
              <label class="form-label">密码</label>
              <input type="password" class="form-input" id="login-password" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary btn-block" onclick="handleLogin()">登 录</button>
            <div class="auth-footer">
              还没有账号？<a href="javascript:void(0)" onclick="switchTab('register')">立即注册</a>
            </div>
          </div>
          
          <div id="register-form" style="display: none;">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">真实姓名</label>
                <input type="text" class="form-input" id="register-name" placeholder="请输入真实姓名">
              </div>
              <div class="form-group">
                <label class="form-label">身份证号</label>
                <input type="text" class="form-input" id="register-idcard" placeholder="18位身份证号" maxlength="18">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">手机号</label>
              <input type="tel" class="form-input" id="register-phone" placeholder="请输入手机号" maxlength="11">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">设置密码</label>
                <input type="password" class="form-input" id="register-password" placeholder="6-20位密码">
              </div>
              <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" class="form-input" id="register-confirm" placeholder="再次输入密码">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">联系地址</label>
              <input type="text" class="form-input" id="register-address" placeholder="请输入详细地址（选填）">
            </div>
            <button class="btn btn-primary btn-block" onclick="handleRegister()">注 册</button>
            <div class="auth-footer">
              已有账号？<a href="javascript:void(0)" onclick="switchTab('login')">立即登录</a>
            </div>
          </div>
        </div>
        
        <div class="public-link">
          <a href="/dashboard.html">📊 查看公开数据看板 →</a>
        </div>
      </div>
    </div>
    
    <div class="features">
      <div class="feature-card">
        <div class="feature-icon">📝</div>
        <h3 class="feature-title">便捷提交</h3>
        <p class="feature-desc">实名注册后即可提交诉求，支持照片、视频上传佐证</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">⚡</div>
        <h3 class="feature-title">智能分派</h3>
        <p class="feature-desc">根据事项类型自动路由至对应职能部门处理</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">🔍</div>
        <h3 class="feature-title">全程跟踪</h3>
        <p class="feature-desc">实时查看处理进度，接收状态变更通知</p>
      </div>
    </div>
  </div>
  
  <script src="/js/api.js"></script>
  <script>
    function switchTab(tab) {
      const tabs = document.querySelectorAll('.auth-tab');
      tabs.forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    }
    
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
    
    async function handleLogin() {
      const phone = document.getElementById('login-phone').value.trim();
      const password = document.getElementById('login-password').value;
      
      if (!phone || !password) {
        showAlert('请填写手机号和密码', 'error');
        return;
      }
      
      try {
        const data = await api.auth.login({ phone, password });
        setToken(data.token);
        setUser(data.user);
        
        showAlert('登录成功！正在跳转...', 'success');
        
        setTimeout(() => {
          const user = data.user;
          if (user.role === 'admin') {
            window.location.href = '/admin.html';
          } else if (user.role === 'staff') {
            window.location.href = '/staff.html';
          } else {
            window.location.href = '/citizen.html';
          }
        }, 1000);
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
    
    async function handleRegister() {
      const name = document.getElementById('register-name').value.trim();
      const idCard = document.getElementById('register-idcard').value.trim();
      const phone = document.getElementById('register-phone').value.trim();
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      const address = document.getElementById('register-address').value.trim();
      
      if (!name || !idCard || !phone || !password || !confirm) {
        showAlert('请填写所有必填项', 'error');
        return;
      }
      
      if (!/^\d{17}[\dXx]$/.test(idCard)) {
        showAlert('请输入正确的18位身份证号', 'error');
        return;
      }
      
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        showAlert('请输入正确的手机号', 'error');
        return;
      }
      
      if (password.length < 6 || password.length > 20) {
        showAlert('密码长度应为6-20位', 'error');
        return;
      }
      
      if (password !== confirm) {
        showAlert('两次输入的密码不一致', 'error');
        return;
      }
      
      try {
        const data = await api.auth.register({
          real_name: name,
          id_card: idCard,
          phone,
          password,
          address
        });
        
        setToken(data.token);
        setUser(data.user);
        
        showAlert('注册成功！正在跳转...', 'success');
        
        setTimeout(() => {
          window.location.href = '/citizen.html';
        }, 1000);
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
    
    if (getToken()) {
      const user = getUser();
      if (user) {
        if (user.role === 'admin') {
          window.location.href = '/admin.html';
        } else if (user.role === 'staff') {
          window.location.href = '/staff.html';
        } else {
          window.location.href = '/citizen.html';
        }
      }
    }
  </script>
</body>
</html>
