<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 城市居民意见与投诉受理平台</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .form-select { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; background: white; }
    .form-select:focus { outline: none; border-color: #667eea; }
    .form-textarea { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; min-height: 100px; resize: vertical; font-family: inherit; }
    .form-textarea:focus { outline: none; border-color: #667eea; }
    .form-input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
    .form-input:focus { outline: none; border-color: #667eea; }
    .complaint-card { background: #fafafa; border-radius: 12px; padding: 20px; margin-bottom: 16px; border-left: 4px solid #667eea; transition: all 0.3s ease; cursor: pointer; }
    .complaint-card:hover { transform: translateX(4px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .complaint-card.overdue { border-left-color: #ff4757; }
    .complaint-card.urgent { border-left-color: #ffa502; }
    .complaint-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .complaint-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 4px; }
    .complaint-meta { font-size: 13px; color: #888; }
    .complaint-desc { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 12px; }
    .complaint-footer { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #888; }
    .detail-section { margin-bottom: 24px; }
    .detail-label { font-size: 13px; color: #888; margin-bottom: 4px; }
    .detail-value { font-size: 15px; color: #333; }
    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .notification-item { padding: 16px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s ease; }
    .notification-item:hover { background: #f5f5f5; }
    .notification-item.unread { background: rgba(102, 126, 234, 0.05); }
    .notification-title { font-weight: 500; margin-bottom: 4px; }
    .notification-content { color: #666; font-size: 14px; margin-bottom: 4px; }
    .notification-time { font-size: 12px; color: #999; }
    .unread-dot { display: inline-block; width: 8px; height: 8px; background: #ff4757; border-radius: 50%; margin-right: 8px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-assigned { background: #d1ecf1; color: #0c5460; }
    .badge-processing { background: #cce5ff; color: #004085; }
    .badge-resolved { background: #d4edda; color: #155724; }
    .badge-reviewing { background: #f8d7da; color: #721c24; }
    .badge-cancelled { background: #e2e3e5; color: #383d41; }
    .badge-normal { background: #e2e3e5; color: #383d41; }
    .badge-urgent { background: #f8d7da; color: #721c24; }
    .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; }
    .stat-card:nth-child(2) { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .stat-card:nth-child(3) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .stat-card:nth-child(4) { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
    .stat-value { font-size: 32px; font-weight: bold; margin-bottom: 4px; }
    .stat-label { font-size: 14px; opacity: 0.9; }
    .btn-block { width: 100%; padding: 12px; margin-bottom: 10px; }
    .overdue-warning { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }
    .deadline-warning { color: #ff4757; font-weight: 600; }
    .chart-container { background: #f9f9f9; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .chart-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #333; }
    .chart-bar { display: flex; align-items: center; margin-bottom: 12px; gap: 12px; }
    .chart-bar-label { width: 120px; font-size: 13px; color: #666; flex-shrink: 0; }
    .chart-bar-track { flex: 1; height: 24px; background: #e0e0e0; border-radius: 12px; overflow: hidden; }
    .chart-bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 12px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: white; font-size: 12px; font-weight: 500; transition: width 0.5s ease; }
    .chart-bar-fill.green { background: linear-gradient(90deg, #11998e, #38ef7d); }
    .chart-bar-fill.orange { background: linear-gradient(90deg, #f093fb, #f5576c); }
    .chart-bar-value { width: 60px; text-align: right; font-size: 13px; font-weight: 600; color: #333; }
    .dept-stat-card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .dept-stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .dept-stat-name { font-weight: 600; color: #333; }
    .dept-stat-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; text-align: center; }
    .dept-stat-metric { padding: 8px; background: #f9f9f9; border-radius: 8px; }
    .dept-stat-metric-value { font-size: 20px; font-weight: bold; color: #667eea; }
    .dept-stat-metric-label { font-size: 11px; color: #888; }
    .hotspot-card { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .hotspot-title { font-weight: 600; color: #d63031; margin-bottom: 8px; }
    .hotspot-count { font-size: 24px; font-weight: bold; color: #d63031; }
    .hotspot-desc { color: #666; font-size: 14px; }
    .user-card { background: #fafafa; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    .user-details h4 { margin-bottom: 4px; color: #333; }
    .user-details p { font-size: 13px; color: #888; }
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f9f9f9; font-weight: 600; color: #555; }
    tr:hover { background: #f5f5f5; }
    @media (max-width: 768px) {
      .main-content { grid-template-columns: 1fr; }
      .stat-cards { grid-template-columns: repeat(2, 1fr); }
      .dept-stat-metrics { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🏛️</div>
        <div class="logo-text">
          <h1>城市居民意见与投诉受理平台</h1>
          <p>管理后台</p>
        </div>
      </div>
      <div class="user-info">
        <div style="position: relative;">
          <button class="btn btn-secondary" onclick="showNotifications()">
            🔔 通知
            <span id="unread-badge" class="badge" style="display:none;margin-left:4px;background:#ff4757;color:white;"></span>
          </button>
        </div>
        <div class="user-avatar" id="user-avatar">A</div>
        <div>
          <div style="font-weight:500;" id="user-name">管理员</div>
          <div style="font-size:12px;color:#888;">系统管理员</div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="logout()">退出</button>
      </div>
    </div>
    
    <div class="main-content">
      <div class="sidebar">
        <ul class="nav-menu">
          <li class="nav-item">
            <div class="nav-link active" data-page="dashboard" onclick="switchPage('dashboard')">
              <span>📊</span> 数据概览
            </div>
          </li>
          <li class="nav-item">
            <div class="nav-link" data-page="complaints" onclick="switchPage('complaints')">
              <span>📋</span> 工单管理
            </div>
          </li>
          <li class="nav-item">
            <div class="nav-link" data-page="overdue" onclick="switchPage('overdue')">
              <span>⏰</span> 逾期督办
              <span id="overdue-count" class="badge" style="margin-left:auto;background:#ff4757;color:white;"></span>
            </div>
          </li>
          <li class="nav-item">
            <div class="nav-link" data-page="hotspots" onclick="switchPage('hotspots')">
              <span>🔥</span> 热点问题
            </div>
          </li>
          <li class="nav-item">
            <div class="nav-link" data-page="departments" onclick="switchPage('departments')">
              <span>🏛️</span> 部门统计
            </div>
          </li>
          <li class="nav-item">
            <div class="nav-link" data-page="users" onclick="switchPage('users')">
              <span>👥</span> 用户管理
            </div>
          </li>
          <li class="nav-item">
            <div class="nav-link" data-page="public" onclick="window.open('/dashboard.html','_blank')">
              <span>📈</span> 公开数据
            </div>
          </li>
        </ul>
      </div>
      
      <div class="content-area" id="content-area">
      </div>
    </div>
  </div>
  
  <script src="/js/api.js"></script>
  <script>
    let currentUser = null;
    let departments = [];
    let departmentUsers = {};
    
    async function init() {
      const token = getToken();
      if (!token) {
        window.location.href = '/';
        return;
      }
      
      try {
        const result = await api.auth.me();
        currentUser = result.user;
        setUser(currentUser);
        
        if (currentUser.role !== 'admin') {
          removeToken();
          window.location.href = '/';
          return;
        }
        
        document.getElementById('user-avatar').textContent = currentUser.real_name.charAt(0);
        document.getElementById('user-name').textContent = currentUser.real_name;
        
        await loadCommonData();
        startNotificationPolling();
        updateOverdueCount();
        switchPage('dashboard');
      } catch (err) {
        if (err.message.includes('401') || err.message.includes('未登录')) {
          removeToken();
          window.location.href = '/';
        } else {
          showAlert(err.message, 'error');
        }
      }
    }
    
    async function loadCommonData() {
      const result = await api.common.getDepartments();
      departments = result.departments;
    }
    
    function startNotificationPolling() {
      updateUnreadCount();
      setInterval(updateUnreadCount, 30000);
    }
    
    async function updateUnreadCount() {
      try {
        const data = await api.notifications.getUnreadCount();
        const badge = document.getElementById('unread-badge');
        if (data.unread_count > 0) {
          badge.textContent = data.unread_count;
          badge.style.display = 'inline-block';
        } else {
          badge.style.display = 'none';
        }
      } catch (err) {
        console.error('Failed to update unread count:', err);
      }
    }
    
    async function updateOverdueCount() {
      try {
        const result = await api.admin.getOverdue();
        const data = result.overdue;
        const badge = document.getElementById('overdue-count');
        if (data.length > 0) {
          badge.textContent = data.length;
          badge.style.display = 'inline-block';
        } else {
          badge.style.display = 'none';
        }
      } catch (err) {
        console.error('Failed to update overdue count:', err);
      }
    }
    
    function switchPage(page) {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
      });
      document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
      
      switch(page) {
        case 'dashboard': renderDashboard(); break;
        case 'complaints': renderComplaints(); break;
        case 'overdue': renderOverdue(); break;
        case 'hotspots': renderHotspots(); break;
        case 'departments': renderDepartmentStats(); break;
        case 'users': renderUsers(); break;
      }
    }
    
    async function renderDashboard() {
      showLoading();
      const content = document.getElementById('content-area');
      
      try {
        const [statsResult, hotspotsResult] = await Promise.all([
          api.admin.getStats(),
          api.common.getHotspots()
        ]);
        const stats = statsResult.overview || {};
        const overdue = statsResult.overdue || {};
        const hotspots = hotspotsResult.hotspots || [];
        
        const totalCount = stats.total || 0;
        const pendingCount = stats.pending || 0;
        const processingCount = stats.processing || 0;
        const resolvedCount = stats.resolved || 0;
        const overdueCount = overdue.count || 0;
        const avgDays = stats.avg_resolve_days || 0;
        const avgRating = stats.avg_rating || 0;
        const todayCount = stats.today || 0;
        
        content.innerHTML = `
          <h2 class="page-title">📊 数据概览</h2>
          
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-value">${totalCount}</div>
              <div class="stat-label">总工单数</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${pendingCount}</div>
              <div class="stat-label">待处理</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${processingCount}</div>
              <div class="stat-label">处理中</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${overdueCount}</div>
              <div class="stat-label">已逾期</div>
            </div>
          </div>
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
            <div class="chart-container">
              <h3 class="chart-title">📈 工单状态分布</h3>
              <div class="chart-bar">
                <div class="chart-bar-label">待处理</div>
                <div class="chart-bar-track">
                  <div class="chart-bar-fill" style="width: ${calculatePercentage(pendingCount, totalCount)}%"></div>
                </div>
                <div class="chart-bar-value">${pendingCount}</div>
              </div>
              <div class="chart-bar">
                <div class="chart-bar-label">处理中</div>
                <div class="chart-bar-track">
                  <div class="chart-bar-fill green" style="width: ${calculatePercentage(processingCount, totalCount)}%"></div>
                </div>
                <div class="chart-bar-value">${processingCount}</div>
              </div>
              <div class="chart-bar">
                <div class="chart-bar-label">已完成</div>
                <div class="chart-bar-track">
                  <div class="chart-bar-fill orange" style="width: ${calculatePercentage(resolvedCount, totalCount)}%"></div>
                </div>
                <div class="chart-bar-value">${resolvedCount}</div>
              </div>
              <div class="chart-bar">
                <div class="chart-bar-label">已逾期</div>
                <div class="chart-bar-track">
                  <div class="chart-bar-fill" style="width: ${calculatePercentage(overdueCount, totalCount)}%; background: linear-gradient(90deg, #eb3349, #f45c43);"></div>
                </div>
                <div class="chart-bar-value">${overdueCount}</div>
              </div>
            </div>
            
            <div class="chart-container">
              <h3 class="chart-title">⭐ 效率指标</h3>
              <div class="chart-bar">
                <div class="chart-bar-label">平均处理时长</div>
                <div class="chart-bar-value" style="width:100%;text-align:left;">
                  <strong>${avgDays}</strong> 天
                </div>
              </div>
              <div class="chart-bar">
                <div class="chart-bar-label">平均满意度</div>
                <div class="chart-bar-value" style="width:100%;text-align:left;">
                  <strong>${avgRating}</strong> 分
                  <span style="color:#ffc107;margin-left:8px;">${'⭐'.repeat(Math.round(avgRating))}</span>
                </div>
              </div>
              <div class="chart-bar">
                <div class="chart-bar-label">今日新增</div>
                <div class="chart-bar-value" style="width:100%;text-align:left;">
                  <strong>${todayCount}</strong> 件
                </div>
              </div>
              <div class="chart-bar">
                <div class="chart-bar-label">累计完成</div>
                <div class="chart-bar-value" style="width:100%;text-align:left;">
                  <strong>${resolvedCount}</strong> 件
                </div>
              </div>
            </div>
          </div>
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
            <div>
              <h3 style="margin-bottom:16px;color:#333;display:flex;justify-content:space-between;align-items:center;">
                <span>🔥 热点问题</span>
                <button class="btn btn-secondary btn-sm" onclick="scanHotspots()">🔄 刷新热点</button>
              </h3>
              ${hotspots.length > 0 ? hotspots.slice(0, 5).map(h => `
                <div class="hotspot-card">
                  <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                      <div class="hotspot-title">${h.type_name}</div>
                      <div class="hotspot-desc">📍 ${h.area_name}</div>
                    </div>
                    <div class="hotspot-count">${h.complaint_count} 件</div>
                  </div>
                </div>
              `).join('') : '<p style="color:#888;text-align:center;padding:40px;">暂无热点问题</p>'}
            </div>
            
            <div>
              <h3 style="margin-bottom:16px;color:#333;display:flex;justify-content:space-between;align-items:center;">
                <span>⚡ 快捷操作</span>
              </h3>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <button class="btn btn-primary" onclick="switchPage('overdue')" style="padding:20px;flex-direction:column;gap:8px;">
                  <span style="font-size:24px;">⏰</span>
                  <span>逾期督办</span>
                </button>
                <button class="btn btn-success" onclick="scanOverdue()" style="padding:20px;flex-direction:column;gap:8px;">
                  <span style="font-size:24px;">🔍</span>
                  <span>扫描逾期</span>
                </button>
                <button class="btn btn-warning" onclick="switchPage('complaints')" style="padding:20px;flex-direction:column;gap:8px;">
                  <span style="font-size:24px;">📋</span>
                  <span>工单管理</span>
                </button>
                <button class="btn btn-secondary" onclick="window.open('/dashboard.html','_blank')" style="padding:20px;flex-direction:column;gap:8px;">
                  <span style="font-size:24px;">📊</span>
                  <span>公开数据</span>
                </button>
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
    
    function calculatePercentage(value, total) {
      if (!total || !value) return 0;
      return Math.min(100, Math.round((value / total) * 100));
    }
    
    async function scanOverdue() {
      try {
        await api.admin.scanOverdue();
        showAlert('逾期工单扫描完成！', 'success');
        updateOverdueCount();
        renderDashboard();
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
    
    async function scanHotspots() {
      try {
        await api.admin.scanHotspots();
        showAlert('热点问题扫描完成！', 'success');
        renderDashboard();
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
    
    async function renderComplaints() {
      showLoading();
      const content = document.getElementById('content-area');
      
      try {
        const result = await api.admin.getComplaints();
        const complaints = result.complaints;
        
        content.innerHTML = `
          <h2 class="page-title">📋 工单管理</h2>
          
          <div class="filter-bar">
            <select id="filter-status" onchange="filterComplaints()">
              <option value="">全部状态</option>
              <option value="pending">待处理</option>
              <option value="assigned">已分派</option>
              <option value="processing">处理中</option>
              <option value="resolved">已完成</option>
              <option value="reviewing">复查中</option>
              <option value="cancelled">已取消</option>
            </select>
            <select id="filter-urgency" onchange="filterComplaints()">
              <option value="">全部紧急程度</option>
              <option value="urgent">紧急</option>
              <option value="normal">普通</option>
            </select>
            <select id="filter-department" onchange="filterComplaints()">
              <option value="">全部部门</option>
              ${departments.map(d => `<option value="${d.id}">${d.name}</option>`).join('')}
            </select>
            <input type="text" id="filter-keyword" placeholder="搜索关键词..." onkeyup="filterComplaints()">
          </div>
          
          <div id="complaint-list-container">
            ${renderComplaintCards(complaints)}
          </div>
          
          ${result.pagination && result.pagination.total > 0 ? `
            <div style="text-align:center;margin-top:20px;color:#888;">
              共 ${result.pagination.total} 条记录
            </div>
          ` : ''}
        `;
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
    
    function renderComplaintCards(complaints) {
      if (!complaints || complaints.length === 0) {
        return '<p style="color:#888;text-align:center;padding:60px;">暂无工单记录</p>';
      }
      
      return complaints.map(c => `
        <div class="complaint-card ${isOverdue(c.deadline) ? 'overdue' : ''} ${c.urgency === 'urgent' ? 'urgent' : ''}" 
             onclick="viewComplaintDetail(${c.id}, 'complaints')" 
             data-status="${c.status}" 
             data-urgency="${c.urgency}" 
             data-department="${c.department_id || ''}"
             data-title="${c.title}"
             data-citizen="${c.citizen_name || ''}">
          <div class="complaint-header">
            <div>
              <div class="complaint-title">${c.title}</div>
              <div class="complaint-meta">${c.type_name} · ${c.area_name} · ${c.citizen_name || '匿名'}</div>
            </div>
            <div style="display:flex;gap:8px;flex-direction:column;align-items:flex-end;">
              <span class="badge ${getUrgencyBadge(c.urgency)}">${getUrgencyText(c.urgency)}</span>
              <span class="badge ${getStatusBadge(c.status)}">${getStatusText(c.status)}</span>
              ${isOverdue(c.deadline) ? '<span class="badge badge-urgent">已逾期</span>' : ''}

      const urgency = document.getElementById('filter-urgency')?.value;
      const department = document.getElementById('filter-department')?.value;
      const keyword = document.getElementById('filter-keyword')?.value.toLowerCase();
      
      document.querySelectorAll('.complaint-card').forEach(card => {

        if (status && card.dataset.status !== status) show = false;
        if (urgency && card.dataset.urgency !== urgency) show = false;
        if (department && card.dataset.department !== department) show = false;

        card.style.display = show ? 'block' : 'none';
      });

    function getDaysOverdue(deadline) {
      if (!deadline) return 0;
      const now = new Date();
      const dead = new Date(deadline);
      const diff = Math.floor((now - dead) / (1000 * 60 * 60 * 24));
      return Math.max(0, diff);
    }

          <textarea class="form-textarea" id="extend-reason" placeholder="请说明延期原因..." style="min-height:100px;"></textarea>
          <div style="margin-top:16px;display:flex;gap:12px;">
            <button class="btn btn-warning" onclick="submitExtend(${complaintId})">确认延期</button>
            <button class="btn btn-secondary" onclick="closeModal('${modalId}')">取消</button>
          </div>
        </div>
      `, '延期处理');
    }
    
    async function submitExtend(complaintId) {
      const days = parseInt(document.getElementById('extend-days').value);
      const reason = document.getElementById('extend-reason').value.trim();
      
      if (!reason) {
        showAlert('请填写延期原因', 'error');
        return;
      }
      
      try {
        await api.admin.extendDeadline(complaintId, days, reason);
        showAlert('延期成功！', 'success');
        closeModal(document.querySelector('.modal.show').id);
        viewComplaintDetail(complaintId, 'complaints');
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
    
    async function showNotifications() {
      try {
        const result = await api.notifications.list();
        const notifications = result.notifications;
        
        const modalId = showModal(`
          <div style="max-height:500px;overflow-y:auto;margin:-10px;">
            ${notifications && notifications.length > 0 ? notifications.map(n => `
              <div class="notification-item ${n.is_read ? '' : 'unread'}" onclick="markNotificationRead(${n.id})">
                <div class="notification-title">
                  ${!n.is_read ? '<span class="unread-dot"></span>' : ''}${n.title}
                </div>
                <div class="notification-content">${n.content}</div>
                <div class="notification-time">${formatDate(n.created_at)}</div>
              </div>
            `).join('') : '<p style="color:#888;text-align:center;padding:40px;">暂无通知</p>'}
          </div>
          ${notifications && notifications.some(n => !n.is_read) ? `
            <div style="margin-top:16px;text-align:right;">
              <button class="btn btn-secondary btn-sm" onclick="markAllNotificationsRead()">全部标记已读</button>
            </div>
          ` : ''}
        `, '通知中心');
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
    
    async function markNotificationRead(id) {
      try {
        await api.notifications.markRead(id);
        updateUnreadCount();
      } catch (err) {
        console.error('Failed to mark notification read:', err);
      }
    }
    
    async function markAllNotificationsRead() {
      try {
        await api.notifications.markAllRead();
        updateUnreadCount();
        closeModal(document.querySelector('.modal.show').id);
        showAlert('已全部标记为已读', 'success');
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
    
    function openMedia(url) {
      window.open(url, '_blank');
    }
    
    init();
  </script>
</body>
</html>
